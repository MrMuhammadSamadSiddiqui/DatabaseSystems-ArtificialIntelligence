<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management — VEI NEXUS</title>
    <link rel="stylesheet" href="/public/css/teacher.css">
    <link rel="stylesheet" href="/public/css/course.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="/public/js/course.js" defer></script>
    <script src="/public/js/script.js" defer></script>
    

</head>
<body class="teacher-page">
    <div class="bg_grid"></div>
    <div class="bg_watermark"></div>
    <div class="dashboard-wrapper">

    <div id="cursor"></div>
    <div id="ring"></div>

        <!-- SIDEBAR -->
        <nav class="sidebar">

            <!-- LOGO ONLY — no name -->
            <div class="sidebar-header">
                <img src="/public/assets/images/logo_white.png" alt="VEI Logo">
            </div>

            <!-- 4 OPTIONS -->
            <ul class="nav-links">
                <li class="info" onclick="clicked('info')">
                    <button>
                        INFO
                    </button>
                </li>
                <li class="general" onclick="clicked('general')">
                    <button>
                        GENERAL
                    </button>
                </li>
                <li class="attendance" onclick="clicked('attendance')">
                    <button>
                        ATTENDANCE
                    </button>
                </li>
                <li class="students" onclick="clicked('students')">
                    <button>
                        STUDENTS
                    </button>
                </li>
                <li class="marks" onclick="clicked('marks')"> 
                    <button>
                        MARKS
                    </button>
                </li>
            </ul>

            <!-- Back button at bottom -->
            <div class="sidebar-footer">
                <a href="#" onclick="goback()" class="back-btn">
                    BACK
                </a>
            </div>

        </nav>

        <!-- CONTENT -->
        <div class="content-container">

            <!-- TOP BAR — logo left, course name + teacher right -->
            <header class="top-header">
                <div class="top-bar">
                    <div class="course-identity">
                        <span class="course-title"></span>
                    </div>
                    <div class="teacher-identity">
                        <span class="teacher-name"></span>
                        <span class="teacher-id"></span>
                    </div>
                </div>
            </header>

            <!-- MAIN CONTENT — changes based on sidebar tab -->
            <div class="course-content">

                <!-- ── MARKS SECTION ── -->
                <section class="course-section " id="section-marks">
                    <div class="section-header">
                        <button class="action-btn">+ ADD MARKS</button>
                    </div>
                    <div class="nexus-card">
                    
                    </div>
                </section>


                <!-- GENERAL -->

<section class="course-section" id="section-general">

    <div class="section-header">
        <button class="action-btn" id="openPostModal">+ POST</button>
    </div>

    <div class="post-feed" id="postFeed">

    </div>


    <div id="post_not" class="not_available">
        <p>NO POSTS YET</p>
        <span>Click + POST to make your first announcement or share a resource.</span>
    </div>


    <div class="modal-overlay" id="modalOverlay">
        <div class="post-modal">
            <div class="modal-header">
                <span class="modal-title">NEW POST </span>
                
                <button class="modal-close" id="closeModal">x
                </button>            
            </div>
            <div class="badge-selector">
                <button class="badge-opt active" data-badge="ANNOUNCEMENT">ANNOUNCEMENT</button>
                <button class="badge-opt" data-badge="RESOURCE">RESOURCE</button>
            </div>
            <input required type="text" class="modal-input" id="postTitle" placeholder="Title" maxlength="80"/>
            <textarea required class="modal-textarea" id="postText" placeholder="Write something..." rows="4"></textarea>
            <input type="url" class="modal-input" id="postLink" placeholder="Paste a link (optional)"/>
            <button class="action-btn modal-submit" id="submitPost">POST</button>
        </div>
    </div>
    
</section>


                <!-- ── ATTENDANCE SECTION ── -->
<section class="course-section" id="section-attendance">

    <div class="section-header">
        
        <button class="action-btn" id="mark-today">
            + MARK TODAY
        </button>
    </div>
    <div class="nexus-card">
        <table class="data-table" id="attendance-table">
        </table>
    </div>

</section>
                <!-- ── STUDENTS SECTION ── -->
                <section class="course-section" id="section-students">
                    <div class="section-header">
                        
                        <span class="count-badge"></span>
                    </div>
                <div class="nexus-card" id="student_card">
                    <table class="student_tables data-table" >
                            <thead>
                                <tr>
                                    
                                    <th>NAME</th>
                                    <th>STUDENT ID</th>
                                    
                                </tr>
                            </thead>
                            <tbody class="tbody_class">
                               
                            </tbody>
                    </table>
                    
                </div>
                
                <div id="student_not" class="not_available" >
                    <p>NO STUDENT YET</p>
                </div>
            </section>

                <!-- ── INFO SECTION ── -->
                <section class="course-section " id="section-info">
                
                    <div class="nexus-card general-info">
                        <div class="profile-row">
                            <span class="profile-label">COURSE NAME</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">SUBJECT NAME</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">SUBJECT CODE</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">INSTRUCTOR</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">ENROLLED</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">STARTED</span>
                            <span class="profile-value"></span>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    
    <div id="msg-box"></div>

    
</body>
</html>
