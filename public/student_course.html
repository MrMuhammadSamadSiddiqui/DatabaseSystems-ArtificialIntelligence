<body class="teacher-page">
    <div class="bg_grid"></div>
    <div class="bg_watermark"></div>
    <div class="dashboard-wrapper">



        <!-- SIDEBAR -->
        <nav class="sidebar">

            
            <div class="sidebar-header">
                <img src="/public/assets/images/logo_white.png" alt="VEI Logo">
                <h2>VEI NEXUS</h2>
            </div>

            
            <ul class="nav-links">
                <li class="info" onclick="clicked('info')">
                    <button>
                        INFO
                    </button>
                </li>
                <li class="general" onclick="clicked('general')">
                    <button>
                        GENERAL
                    </button>
                </li>
                <li class="attendance" onclick="clicked('attendance')">
                    <button>
                        ATTENDANCE
                    </button>
                </li>
                <li class="students" onclick="clicked('students')">
                    <button>
                        STUDENTS
                    </button>
                </li>
                <!-- <li class="marks" onclick="clicked('marks')"> 
                    <button>
                        MARKS
                    </button>
                </li> -->
                <li>
                    <a href="#" onclick="goback()" class="back-btn">
                        BACK
                    </a>
                </li>
                
            </ul>

            
          <div class="section-name course_i">
                <div class="course-identity">
                    <span class="course-title"></span>
                </div>
                <div class="teacher-identity">
                        <span class="student-name"></span>
                        <span class="student-id"></span>
                    </div>
            </div>
        </nav>

        
        <div class="content-container">

        
            <div class="course-content">

                
                <section class="course-section " id="section-marks">
                    <div class="section-header">
                        <button class="action-btn">+ ADD MARKS</button>
                    </div>
                    <div class="nexus-card">
                    
                    </div>
                </section>


                

<section class="course-section" id="section-general">



    <div class="post-feed" id="postFeed">

    </div>


    <div id="post_not" class="not_available">
        <p>NO POSTS YET</p>
    </div>
</section>

<section class="course-section" id="section-attendance">

    <!-- Summary top field -->
    <div class="nexus-card">
        <div class="att-controls">
            <div class="att-summary-item">
                <span class="date-window-label">TOTAL</span>
                <span class="att-summary-value" id="att-total">—</span>
            </div>
            <div class="att-summary-item">
                <span class="date-window-label">PRESENT</span>
                <span class="att-summary-value" id="att-present" style="color:#4ade80;">—</span>
            </div>
            <div class="att-summary-item">
                <span class="date-window-label">ABSENT</span>
                <span class="att-summary-value" id="att-absent" style="color:#ff4d4d;">—</span>
            </div>
            <div class="att-summary-item">
                <span class="date-window-label">PERCENTAGE</span>
                <span class="att-summary-value" id="att-percent">—</span>
            </div>
        </div>
    </div>

    <!-- Attendance rows -->
    <div class="nexus-card att-card">
        <div class="att-scroll">

            <div class="att-empty" id="attEmptyStudent">
                <p>NO ATTENDANCE RECORDED</p>
                <span>Your attendance will appear here once your teacher marks it.</span>
            </div>

            <div id="attList"></div>

        </div>
    </div>

</section>

                <section class="course-section" id="section-students">
                    <div class="section-header">
                        
                        <span class="count-badge"></span>
                    </div>
                <div class="nexus-card" id="student_card">
                    <table class="student_tables data-table" >
                            <thead>
                                <tr>
                                    
                                    <th>NAME</th>
                                    <th>STUDENT ID</th>
                                    
                                </tr>
                            </thead>
                            <tbody class="tbody_class">
                               
                            </tbody>
                    </table>
                    
                </div>
                
                <div id="student_not" class="not_available" >
                    <p>NO STUDENT YET</p>
                </div>
            </section>

                <section class="course-section " id="section-info">
                
                    <div class="nexus-card general-info">
                        <h3 class="widget-title">INFO</h3>
                        <div class="profile-row">
                            <span class="profile-label">COURSE NAME</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">SUBJECT NAME</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">SUBJECT CODE</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">INSTRUCTOR</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">ENROLLED</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">STARTED</span>
                            <span class="profile-value"></span>
                        </div>
                        <div class="profile-row">
                            <span class="profile-label">ENROLLED ON</span>
                            <span class="profile-value"></span>
                        </div>
                        
                        <div class="profile-row">
                            <span class="profile-label">ATTENDANCE</span>
                            <span class="profile-value"></span>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    

    
    <div id="msg-box"></div>


</body>
