<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard — VEI NEXUS</title>
    <link rel="stylesheet" href="/public/css/index.css">
    <link rel="stylesheet" href="/public/css/teacher.css">
    <script src="/public/js/config.js"></script>
    <script src="/public/js/teacher.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="bg_grid"></div>
    <div class="bg_watermark"></div>



    <div class="dashboard-wrapper">

        <!-- LEFT SIDEBAR -->
        <nav class="sidebar" >
            <div class="sidebar-header">
                <img src="/public/assets/images/logo_white.png" alt="VEI Logo">
                <h2>VEI NEXUS</h2>
            </div>

            <ul class="nav-links" >
                <li><button class="profile_btn" onclick="showsection('profile')">PROFILE</button></li>
                <li><button class="course_btn" onclick="showsection('courses')" >COURSES</button></li>
                <li><a href="#" onclick="logout()" class="logout-btn">LOGOUT</a></li>
            </ul>

            <!-- Logout pushed to bottom -->
             
            
            
            <div class="section-name">
                
                <span class="teacher-name"></span>
                <span class="teacher-id"></span>
            </div>
        </nav>

        <div class="parent">

                    </div>
                </div>
            </header> -->
            <!-- RIGHT CONTENT -->
            <div class=" content-container" >
    
                <!-- TOP BAR — teacher name on right -->
    
                <!-- MAIN GRID -->
                <div id="courses" class=" sec dashboard-grid">
                    <main class="main-feed">
                        <div class="course-list">
                            
    
                           
                        </div>
                        <div id="course_not" class="not_available">
                            <p>NO COURSES ASSIGNED</p>
                    </div>
                    </main>

                        <div class="nexus-card widget">

                        </div>
    
                        <div class="nexus-card widget">
                            <h3 class="widget-title">LIVE SESSIONS</h3>

                                <a href="#" class="join-btn">START CLASS</a>
                            </div>
                        </div>
                    </aside> -->
                </div>
    
            <div id="profile" class=" sec nexus-card teacher-profile-card">
            <h3 class="widget-title">PROFILE</h3>
            <div class="profile-grid">
                <div class="profile-row">
                    <span  class="profile-label">ID</span>
                    <span id="teacher-id" class="profile-value"></span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">NAME</span>
                    <span id="teacher-name" class="profile-value"></span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">EMAIL</span>
                    <span id="teacher-email" class="profile-value"></span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">PHONE</span>
                        <span id="teacher-phone" class="profile-value"></span>
                    </div>
                    <div class="profile-row">
                        <span class="profile-label">JOINED</span>
                        <span id="teacher-joined" class="profile-value"></span>
                    </div>
                </div>
            </div>
    
            </div>
        </div>
    </div>
</body>
